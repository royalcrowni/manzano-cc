  <script>
    const frames = {
      frame1: document.getElementById('frame1'),
      frame2: document.getElementById('frame2'),
      frame3: document.getElementById('frame3'),
    };

    const artworkId = {
      frame1: 'svg-manzano_cuadro',
      frame2: 'svg-puerto_rico',
      frame3: 'svg-teodosio_grabado',
    };

    const sigId = {
      frame1: 'svg-manzano',
      frame2: 'svg-ignacio_manzano',
      frame3: 'svg-fundacion_tmanzano',
    };

    let transitioning = false;

    const PIXEL_MAX = 22;
    const STEPS     = 5;
    const STEP_MS   = 100;

    function svgElToImage(svgEl) {
      return new Promise((resolve) => {
        const clone = svgEl.cloneNode(true);
        clone.style.visibility = '';
        clone.style.clipPath   = '';
        const rect = svgEl.getBoundingClientRect();
        clone.setAttribute('width',  rect.width);
        clone.setAttribute('height', rect.height);
        const svgStr = new XMLSerializer().serializeToString(clone);
        const blob   = new Blob([svgStr], { type: 'image/svg+xml' });
        const url    = URL.createObjectURL(blob);
        const img    = new Image();
        img.onload = () => { URL.revokeObjectURL(url); resolve(img); };
        img.src = url;
      });
    }

    function makeCanvas(rect) {
      const canvas = document.createElement('canvas');
      canvas.width  = Math.round(rect.width);
      canvas.height = Math.round(rect.height);
      Object.assign(canvas.style, {
        position:       'fixed',
        left:           Math.round(rect.left)   + 'px',
        top:            Math.round(rect.top)    + 'px',
        width:          Math.round(rect.width)  + 'px',
        height:         Math.round(rect.height) + 'px',
        zIndex:         '100',
        pointerEvents:  'none',
        imageRendering: 'pixelated',
      });
      document.body.appendChild(canvas);
      const ctx = canvas.getContext('2d');
      ctx.imageSmoothingEnabled = false;
      return { canvas, ctx };
    }

    function repositionCanvas(c, rect) {
      c.canvas.style.left   = Math.round(rect.left)   + 'px';
      c.canvas.style.top    = Math.round(rect.top)    + 'px';
      c.canvas.style.width  = Math.round(rect.width)  + 'px';
      c.canvas.style.height = Math.round(rect.height) + 'px';
      c.canvas.width  = Math.round(rect.width);
      c.canvas.height = Math.round(rect.height);
      c.ctx.imageSmoothingEnabled = false;
    }

    const tmp    = document.createElement('canvas');
    const tmpCtx = tmp.getContext('2d');
    tmpCtx.imageSmoothingEnabled = false;

    function drawPx(ctx, img, w, h, size) {
      ctx.clearRect(0, 0, w, h);
      if (size <= 1) { ctx.drawImage(img, 0, 0, w, h); return; }
      const sw = Math.max(1, Math.round(w / size));
      const sh = Math.max(1, Math.round(h / size));
      tmp.width = sw; tmp.height = sh;
      tmpCtx.clearRect(0, 0, sw, sh);
      tmpCtx.drawImage(img, 0, 0, sw, sh);
      ctx.drawImage(tmp, 0, 0, w, h);
    }

    function pixelDissolve(fromId, toId) {
      if (transitioning) return;
      transitioning = true;

      const fromFrame = frames[fromId];
      const toFrame   = frames[toId];
      const fromArt   = document.getElementById(artworkId[fromId]);
      const toArt     = document.getElementById(artworkId[toId]);
      const fromSig   = document.getElementById(sigId[fromId]);
      const toSig     = document.getElementById(sigId[toId]);

      fromArt.style.visibility = 'hidden';
      fromSig.style.visibility = 'hidden';

      const artC = makeCanvas(fromArt.getBoundingClientRect());
      const sigC = makeCanvas(fromSig.getBoundingClientRect());

      let step = 0;

      Promise.all([svgElToImage(fromArt), svgElToImage(fromSig)]).then(([fromArtImg, fromSigImg]) => {
        drawPx(artC.ctx, fromArtImg, artC.canvas.width, artC.canvas.height, 1);
        drawPx(sigC.ctx, fromSigImg, sigC.canvas.width, sigC.canvas.height, 1);

        function pixelateOut() {
          step++;
          const size = Math.round(1 + (PIXEL_MAX - 1) * step / STEPS);
          drawPx(artC.ctx, fromArtImg, artC.canvas.width, artC.canvas.height, size);
          drawPx(sigC.ctx, fromSigImg, sigC.canvas.width, sigC.canvas.height, size);
          if (step >= STEPS) {
            switchFrames();
          } else {
            setTimeout(pixelateOut, STEP_MS);
          }
        }

        function switchFrames() {
          fromFrame.classList.remove('active');
          toFrame.classList.add('active');
          toArt.style.visibility = 'hidden';
          toSig.style.visibility = 'hidden';

          requestAnimationFrame(() => requestAnimationFrame(() => {
            repositionCanvas(artC, toArt.getBoundingClientRect());
            repositionCanvas(sigC, toSig.getBoundingClientRect());

            Promise.all([svgElToImage(toArt), svgElToImage(toSig)]).then(([toArtImg, toSigImg]) => {
              drawPx(artC.ctx, toArtImg, artC.canvas.width, artC.canvas.height, PIXEL_MAX);
              drawPx(sigC.ctx, toSigImg, sigC.canvas.width, sigC.canvas.height, PIXEL_MAX);
              step = 0;

              function pixelateIn() {
                step++;
                const size = Math.max(1, Math.round(PIXEL_MAX - (PIXEL_MAX - 1) * step / STEPS));
                drawPx(artC.ctx, toArtImg, artC.canvas.width, artC.canvas.height, size);
                drawPx(sigC.ctx, toSigImg, sigC.canvas.width, sigC.canvas.height, size);
                if (step >= STEPS) {
                  toArt.style.visibility = '';
                  toSig.style.visibility = '';
                  artC.canvas.remove();
                  sigC.canvas.remove();
                  transitioning = false;
                } else {
                  setTimeout(pixelateIn, STEP_MS);
                }
              }
              setTimeout(pixelateIn, STEP_MS);
            });
          }));
        }

        setTimeout(pixelateOut, STEP_MS);
      });
    }

    document.getElementById('svg-manzano_cuadro').addEventListener('click',    () => pixelDissolve('frame1', 'frame2'));
    document.getElementById('svg-puerto_rico').addEventListener('click',        () => pixelDissolve('frame2', 'frame3'));
    document.getElementById('svg-teodosio_grabado').addEventListener('click',   () => pixelDissolve('frame3', 'frame1'));

    document.getElementById('svg-ignacio_manzano').addEventListener('click', () => {
      window.open('https://www.ignaciomanzano.com', '_blank');
    });
    document.getElementById('svg-fundacion_tmanzano').addEventListener('click', () => {
      window.open('https://www.fundacionteodosiomanzano.org', '_blank');
    });

    frames.frame1.classList.add('active');
  </script>

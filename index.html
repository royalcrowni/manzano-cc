<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#000000" media="(max-width: 600px)">
<meta name="theme-color" content="#111111" media="(min-width: 601px)">
<title>manzano.cc</title>
<link rel="shortcut icon" href="/m.cc_bk.png?v=2">
<link rel="icon" type="image/png" href="/m.cc_bk.png?v=2" media="(prefers-color-scheme: light)">
<link rel="icon" type="image/png" href="/m.cc_w.png?v=2" media="(prefers-color-scheme: dark)">
<style>
  @import url('https://fonts.cdnfonts.com/css/dank-mono');

  :root {
    --bg: #111111;
    --white: #e8e8e8;
    --dim: #555555;
    --comment: #3a3a3a;
    --ainews: #D13D45;
    --airoi: #D07546;
    --bdash: #9b6dcc;
    --carbon: #4a9e6b;
    --blue: #5b8fe8;
    --purple: #9b6dcc;
    --lab: #c8a800;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html {
    background: #111111;
  }

  body {
    background: #111111;
    color: var(--white);
    font-family: 'Dank Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    overflow-x: hidden;
  }

  /* Fix iOS grey bars */
  @supports (padding-top: env(safe-area-inset-top)) {
    body {
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      background-color: #111111;
    }
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.65) 100%);
    pointer-events: none;
    z-index: 9998;
  }

  .terminal {
    max-width: 820px;
    margin: 0 auto;
    padding: 48px 28px 120px;
    min-height: 100vh;
  }

  .code-block {
    font-size: clamp(12px, 2.5vw, 14px);
    line-height: 1.8;
  }

  .line {
    display: block;
    white-space: pre-wrap;
    word-break: break-word;
    min-height: 1.8em;
  }

  .c-comment { color: var(--comment); }
  .c-dim     { color: var(--dim); }
  .c-white   { color: var(--white); }

  @keyframes shine {
    0%   { background-position: -200% center; }
    100% { background-position: 200% center; }
  }

  .shiny {
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    background-size: 200% auto;
    animation: shine 2.6s linear infinite;
    text-decoration: none;
    cursor: pointer;
    display: inline;
  }
  .shiny.white-shine {
    background-image: linear-gradient(90deg, var(--white) 15%, #ffffff 50%, var(--white) 85%);
  }
  .shiny.lab-shine {
    background-image: linear-gradient(90deg, var(--lab) 15%, #ffe066 50%, var(--lab) 85%);
    font-style: italic;
  }
  .shiny.ainews-shine {
    background-image: linear-gradient(90deg, var(--ainews) 15%, #ff9a9e 50%, var(--ainews) 85%);
  }
  .shiny.airoi-shine {
    background-image: linear-gradient(90deg, var(--airoi) 15%, #ffd4a8 50%, var(--airoi) 85%);
  }
  .shiny.bdash-shine {
    background-image: linear-gradient(90deg, var(--bdash) 15%, #ddb8ff 50%, var(--bdash) 85%);
  }
  .shiny.carbon-shine {
    background-image: linear-gradient(90deg, var(--carbon) 15%, #a8ffca 50%, var(--carbon) 85%);
  }
  .shiny.blue-shine {
    background-image: linear-gradient(90deg, var(--blue) 15%, #b8d4ff 50%, var(--blue) 85%);
  }

  .cur {
    display: inline-block;
    width: 8px;
    height: 0.85em;
    background: var(--white);
    vertical-align: middle;
    margin-left: 1px;
    animation: blink 0.75s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0; }
  }

  @media (max-width: 600px) {
    .terminal { padding: 32px 18px 80px; }
    html, body {
      background: #000000 !important;
      background-color: #000000 !important;
    }
  }
</style>
</head>
<body>

<div class="terminal">
  <div class="code-block" id="code"></div>
</div>

<script>
function getLastLogin() {
  const now = new Date();
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${days[now.getDay()]} ${months[now.getMonth()]} ${String(now.getDate()).padStart(2,'0')} ${now.getFullYear()}`;
}
function getConsoleTime() {
  const now = new Date();
  return `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
}

const lines = [
  {
    plain: '<' + '/script>',
    final: `<span class="c-white">&lt;/script&gt;</span>`
  },
  {
    plain: 'Welcome to () manzano.cc',
    final: `<span class="c-white">Welcome to () <a href="https://www.manzano.cc" class="shiny white-shine">manzano.cc</a></span>`
  },
  {
    plain: `Last login: ${getLastLogin()} on console`,
    final: `<span class="c-white">Last login: ${getLastLogin()} on console</span>`
  },
  {
    plain: `${getConsoleTime()} on console  ]{`,
    final: `<span class="c-white">${getConsoleTime()} on console  ]{</span>`
  },
  {
    plain: 'LEFT CURLY BRACKET',
    final: `<span class="c-dim">LEFT CURLY BRACKET</span>`
  },
  {
    plain: 'Unicode: U+007B, UTF-8: 7B.',
    final: `<span class="c-dim">Unicode: U+007B, UTF-8: 7B.</span>`
  },
  { plain: '' },
  {
    plain: '// projects',
    final: `<span class="c-comment">// projects</span>`
  },
  { plain: '' },
  {
    plain: '{name: "AI News Digest", status: "live"}',
    final: `<span class="c-white">{name: </span><a href="https://manzano.cc/ai-news" class="shiny ainews-shine">"AI News Digest"</a><span class="c-white">, status: "live"}</span>`
  },
  {
    plain: '  Daily AI news and insights delivered straight to your inbox.',
    final: `<span class="c-dim">  Daily AI news and insights delivered straight to your inbox.</span>`
  },
  { plain: '' },
  {
    plain: '{name: "AI ROI", status: "live"}',
    final: `<span class="c-white">{name: </span><a href="https://airoi.manzano.cc" class="shiny airoi-shine">"AI ROI"</a><span class="c-white">, status: "live"}</span>`
  },
  {
    plain: '  Measure the real business impact and ROI of AI in your company.',
    final: `<span class="c-dim">  Measure the real business impact and ROI of AI in your company.</span>`
  },
  { plain: '' },
  {
    plain: '{name: "BDash", status: "paused"}',
    final: `<span class="c-white">{name: </span><a href="https://bdash.manzano.cc" class="shiny bdash-shine">"BDash"</a><span class="c-white">, status: "paused"}</span>`
  },
  {
    plain: '  The open-source control center for AI business development agents.',
    final: `<span class="c-dim">  The open-source control center for AI business development agents.</span>`
  },
  { plain: '' },
  {
    plain: '{name: "CarbonLens", status: "live"}',
    final: `<span class="c-white">{name: </span><a href="https://carbolens.manzano.cc" class="shiny carbon-shine">"CarbonLens"</a><span class="c-white">, status: "live"}</span>`
  },
  {
    plain: '  Evaluate environmental impact, CO₂ emissions, and sustainability performance.',
    final: `<span class="c-dim">  Evaluate environmental impact, CO₂ emissions, and sustainability performance.</span>`
  },
  { plain: '' },
  {
    plain: '// other',
    final: `<span class="c-comment">// other</span>`
  },
  { plain: '' },
  {
    plain: 'building random stuff',
    final: `<span class="c-white">building random stuff</span>`
  },
  {
    plain: 'explore our /lab.',
    final: `<span class="c-white">explore our </span><a href="https://www.manzano.cc/lab" class="shiny lab-shine">/lab</a><span class="c-white">.</span>`
  },
  { plain: '' },
  {
    plain: 'Developed by ignacio.info.',
    final: `<span class="c-white">Developed by </span><a href="https://www.ignacio.info" target="_blank" class="shiny blue-shine">ignacio.info</a><span class="c-white">.</span>`
  },
];

const codeEl = document.getElementById('code');
let idx = 0;
let cur = null;
const BASE = 20;

function charDelay(ch) {
  if (!ch || ch === ' ') return BASE * 0.35;
  if ('(){}[];,="\'.'.includes(ch)) return BASE * 0.55;
  return BASE + Math.random() * 12;
}

function nextLine() {
  if (idx >= lines.length) {
    if (cur) cur.remove();
    return;
  }
  const data = lines[idx];
  const el = document.createElement('span');
  el.className = 'line';
  el.style.display = 'block';
  codeEl.appendChild(el);
  if (cur) cur.remove();
  cur = document.createElement('span');
  cur.className = 'cur';
  el.appendChild(cur);
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  if (data.plain === '') {
    setTimeout(() => {
      el.innerHTML = '';
      idx++;
      setTimeout(nextLine, 50);
    }, 25);
    return;
  }
  const text = data.plain;
  let ci = 0;
  function tick() {
    if (ci >= text.length) {
      el.innerHTML = data.final || text;
      idx++;
      setTimeout(nextLine, 65 + Math.random() * 90);
      return;
    }
    if (cur && cur.parentNode) cur.remove();
    el.textContent = text.substring(0, ci + 1);
    cur = document.createElement('span');
    cur.className = 'cur';
    el.appendChild(cur);
    ci++;
    setTimeout(tick, charDelay(text[ci - 1]));
  }
  tick();
}

setTimeout(nextLine, 300);
</script>
</body>
</html>

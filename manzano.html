<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>manzano.cc</title>
<link rel="icon" type="image/png" href="M_fav.png">
<style>
  @import url('https://fonts.cdnfonts.com/css/dank-mono');

  :root {
    --bg: #111111;
    --white: #e8e8e8;
    --dim: #555555;
    --comment: #3a3a3a;
    --bogavante: #D07546;
    --red: #e05555;
    --purple: #9b6dcc;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: var(--bg);
    color: var(--white);
    font-family: 'Dank Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.65) 100%);
    pointer-events: none;
    z-index: 9998;
  }

  .terminal {
    max-width: 820px;
    margin: 0 auto;
    padding: 48px 28px 120px;
    min-height: 100vh;
  }

  .code-block {
    font-size: clamp(12px, 2.5vw, 14px);
    line-height: 1.8;
  }

  .line {
    display: block;
    white-space: pre-wrap;
    word-break: break-word;
    min-height: 1.8em;
  }

  .c-comment { color: var(--comment); }
  .c-dim     { color: var(--dim); }
  .c-white   { color: var(--white); }

  @keyframes shine {
    0%   { background-position: -200% center; }
    100% { background-position: 200% center; }
  }

  .shiny {
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    background-size: 200% auto;
    animation: shine 2.6s linear infinite;
    text-decoration: none;
    cursor: pointer;
    display: inline;
  }
  .shiny.bogavante {
    background-image: linear-gradient(90deg, var(--bogavante) 15%, #ffd4a8 50%, var(--bogavante) 85%);
  }
  .shiny.red-shine {
    background-image: linear-gradient(90deg, var(--red) 15%, #ffb5b5 50%, var(--red) 85%);
  }
  .shiny.purple-shine {
    background-image: linear-gradient(90deg, var(--purple) 15%, #ddb8ff 50%, var(--purple) 85%);
  }

  .cur {
    display: inline-block;
    width: 8px;
    height: 0.85em;
    background: var(--white);
    vertical-align: middle;
    margin-left: 1px;
    animation: blink 0.75s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0; }
  }

  @media (max-width: 600px) {
    .terminal { padding: 32px 18px 80px; }
  }
</style>
</head>
<body>

<div class="terminal">
  <div class="code-block" id="code"></div>
</div>

<script>
// Dynamic date/time
function getLastLogin() {
  const now = new Date();
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const day = days[now.getDay()];
  const month = months[now.getMonth()];
  const date = String(now.getDate()).padStart(2, '0');
  const year = now.getFullYear();
  return `${day} ${month} ${date} ${year}`;
}

function getConsoleTime() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2, '0');
  const m = String(now.getMinutes()).padStart(2, '0');
  const s = String(now.getSeconds()).padStart(2, '0');
  return `${h}:${m}:${s}`;
}

const lines = [
  {
    plain: '<' + '/script>',
    final: `<span class="c-white">&lt;/script&gt;</span>`
  },
  {
    plain: 'Welcome to () manzano.cc',
    final: `<span class="c-white">Welcome to () manzano.cc</span>`
  },
  {
    plain: `Last login: ${getLastLogin()} on console`,
    final: `<span class="c-white">Last login: ${getLastLogin()} on console</span>`
  },
  {
    plain: `${getConsoleTime()} on console  ]{`,
    final: `<span class="c-white">${getConsoleTime()} on console  ]{</span>`
  },
  {
    plain: 'LEFT CURLY BRACKET',
    final: `<span class="c-dim">LEFT CURLY BRACKET</span>`
  },
  {
    plain: 'Unicode: U+007B, UTF-8: 7B.',
    final: `<span class="c-dim">Unicode: U+007B, UTF-8: 7B.</span>`
  },
  { plain: '' },
  {
    plain: '// projects',
    final: `<span class="c-comment">// projects</span>`
  },
  { plain: '' },
  {
    plain: 'const projects = [',
    final: `<span class="c-white">const projects = [</span>`
  },
  {
    plain: '  {',
    final: `<span class="c-white">  {</span>`
  },
  {
    plain: '    name:   "bogavante.ai",',
    final: `<span class="c-white">    name:   </span><a href="https://www.bogavante.ai" target="_blank" class="shiny bogavante">"bogavante.ai"</a><span class="c-white">,</span>`
  },
  {
    plain: '    status: "live",',
    final: `<span class="c-white">    status: "live",</span>`
  },
  {
    plain: '  },',
    final: `<span class="c-white">  },</span>`
  },
  {
    plain: '  { name: "???", status: "coming_soon" },',
    final: `<span class="c-white">  { name: </span><span class="c-dim">"???"</span><span class="c-white">, status: </span><span class="c-dim">"coming_soon"</span><span class="c-white"> },</span>`
  },
  {
    plain: '  { name: "???", status: "coming_soon" },',
    final: `<span class="c-white">  { name: </span><span class="c-dim">"???"</span><span class="c-white">, status: </span><span class="c-dim">"coming_soon"</span><span class="c-white"> },</span>`
  },
  {
    plain: '];',
    final: `<span class="c-white">];</span>`
  },
  { plain: '' },
  {
    plain: 'engineered by ignacio.info & enrineer.com',
    final: `<span class="c-white">engineered by </span><a href="https://ignacio.info" target="_blank" class="shiny red-shine">ignacio.info</a><span class="c-white"> &amp; </span><a href="https://enrineer.com" target="_blank" class="shiny purple-shine">enrineer.com</a>`
  },
];

const codeEl = document.getElementById('code');
let idx = 0;
let cur = null;
const BASE = 20;

function charDelay(ch) {
  if (!ch || ch === ' ') return BASE * 0.35;
  if ('(){}[];,="\'.'.includes(ch)) return BASE * 0.55;
  return BASE + Math.random() * 12;
}

function nextLine() {
  if (idx >= lines.length) {
    if (cur) cur.remove();
    return;
  }

  const data = lines[idx];
  const el = document.createElement('span');
  el.className = 'line';
  el.style.display = 'block';
  codeEl.appendChild(el);

  if (cur) cur.remove();
  cur = document.createElement('span');
  cur.className = 'cur';
  el.appendChild(cur);

  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  if (data.plain === '') {
    setTimeout(() => {
      el.innerHTML = '';
      idx++;
      setTimeout(nextLine, 50);
    }, 25);
    return;
  }

  const text = data.plain;
  let ci = 0;

  function tick() {
    if (ci >= text.length) {
      el.innerHTML = data.final || text;
      idx++;
      setTimeout(nextLine, 65 + Math.random() * 90);
      return;
    }
    if (cur && cur.parentNode) cur.remove();
    el.textContent = text.substring(0, ci + 1);
    cur = document.createElement('span');
    cur.className = 'cur';
    el.appendChild(cur);
    ci++;
    setTimeout(tick, charDelay(text[ci - 1]));
  }

  tick();
}

setTimeout(nextLine, 300);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — manzano.cc</title>
<link rel="icon" type="image/png" href="/m.cc_bk.png" media="(prefers-color-scheme: light)">
<link rel="icon" type="image/png" href="/m.cc_w.png" media="(prefers-color-scheme: dark)">
<style>
  @import url('https://fonts.cdnfonts.com/css/dank-mono');

  :root {
    --bg: #111111;
    --white: #e8e8e8;
    --dim: #555555;
    --comment: #3a3a3a;
    --red: #e05555;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: var(--bg);
    color: var(--white);
    font-family: 'Dank Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.65) 100%);
    pointer-events: none;
    z-index: 9998;
  }

  .terminal {
    max-width: 820px;
    margin: 0 auto;
    padding: 48px 28px 120px;
    min-height: 100vh;
  }

  .code-block {
    font-size: clamp(12px, 2.5vw, 14px);
    line-height: 1.8;
  }

  .line {
    display: block;
    white-space: pre-wrap;
    word-break: break-word;
    min-height: 1.8em;
  }

  .c-dim  { color: var(--dim); }
  .c-white { color: var(--white); }
  .c-red  { color: var(--red); }

  @keyframes shine {
    0%   { background-position: -200% center; }
    100% { background-position: 200% center; }
  }

  .shiny {
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    background-size: 200% auto;
    animation: shine 2.6s linear infinite;
    text-decoration: none;
    cursor: pointer;
    display: inline;
  }
  .shiny.white-shine {
    background-image: linear-gradient(90deg, var(--white) 15%, #ffffff 50%, var(--white) 85%);
  }

  .cur {
    display: inline-block;
    width: 8px;
    height: 0.85em;
    background: var(--white);
    vertical-align: middle;
    margin-left: 1px;
    animation: blink 0.75s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0; }
  }

  @media (max-width: 600px) {
    .terminal { padding: 32px 18px 80px; }
  }
</style>
</head>
<body>

<div class="terminal">
  <div class="code-block" id="code"></div>
</div>

<script>
const lines = [
  {
    plain: '404: NOT_FOUND',
    final: `<span class="c-white">404: NOT_FOUND</span>`
  },
  { plain: '' },
  {
    plain: 'go back to manzano.cc',
    final: `<span class="c-white">go back to </span><a href="https://www.manzano.cc" class="shiny white-shine">manzano.cc</a>`
  },
];

const codeEl = document.getElementById('code');
let idx = 0;
let cur = null;
const BASE = 20;

function charDelay(ch) {
  if (!ch || ch === ' ') return BASE * 0.35;
  if ('(){}[];,="\'.'.includes(ch)) return BASE * 0.55;
  return BASE + Math.random() * 12;
}

function nextLine() {
  if (idx >= lines.length) {
    if (cur) cur.remove();
    return;
  }

  const data = lines[idx];
  const el = document.createElement('span');
  el.className = 'line';
  el.style.display = 'block';
  codeEl.appendChild(el);

  if (cur) cur.remove();
  cur = document.createElement('span');
  cur.className = 'cur';
  el.appendChild(cur);

  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  if (data.plain === '') {
    setTimeout(() => {
      el.innerHTML = '';
      idx++;
      setTimeout(nextLine, 50);
    }, 25);
    return;
  }

  const text = data.plain;
  let ci = 0;

  function tick() {
    if (ci >= text.length) {
      el.innerHTML = data.final || text;
      idx++;
      setTimeout(nextLine, 65 + Math.random() * 90);
      return;
    }
    if (cur && cur.parentNode) cur.remove();
    el.textContent = text.substring(0, ci + 1);
    cur = document.createElement('span');
    cur.className = 'cur';
    el.appendChild(cur);
    ci++;
    setTimeout(tick, charDelay(text[ci - 1]));
  }

  tick();
}

setTimeout(nextLine, 300);
</script>
</body>
</html>
